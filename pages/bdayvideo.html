<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Exort | Bday Video</title>
    <link rel="stylesheet" href="../css/bdayvideo.css" />
    <script defer src="../js/bdayvideo.js"></script>
  </head>

    <main class="video-page">

        data-bday-video

    </main>
  </body>
</html>
