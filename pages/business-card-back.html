<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Логотип Exort — 2000 × 2000</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas-size: 2000px;
        --brand-black: #000000;
        --brand-cream: #fffdf7;
        --brand-orange: #ff5a36;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        min-height: 320px;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: transparent;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      .logo-canvas {
        display: grid;
        width: min(100vmin, var(--canvas-size));
        height: min(100vmin, var(--canvas-size));
        place-items: center;
        overflow: hidden;
        color: var(--brand-black);
        background: transparent;
      }

      .logo {
        position: relative;
        display: inline-block;
        margin: 0;
        padding-right: clamp(30px, 4.6vmin, 92px);
        font-family: "Unbounded", Arial, sans-serif;
        font-size: clamp(118px, 18vmin, 360px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.075em;
      }

      .logo::after {
        position: absolute;
        top: clamp(-34px, -1.7vmin, -11px);
        right: clamp(3px, .5vmin, 10px);
        width: clamp(24px, 3.6vmin, 72px);
        height: clamp(24px, 3.6vmin, 72px);
        content: "";
        background: var(--brand-orange);
        border-radius: 50%;
      }

      @page {
        size: 2000px 2000px;
        margin: 0;
      }

      @media print {
        html,
        body {
          width: 2000px;
          min-width: 2000px;
          height: 2000px;
          min-height: 2000px;
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }

        .logo-canvas {
          width: 2000px;
          height: 2000px;
        }

        .logo {
          padding-right: 92px;
          font-size: 360px;
        }

        .logo::after {
          top: -34px;
          right: 10px;
          width: 72px;
          height: 72px;
        }
      }
    </style>
  </head>
  <body>
    <main class="logo-canvas" aria-label="Логотип Exort">
      <h1 class="logo">Exort</h1>
    </main>
  </body>
</html>
